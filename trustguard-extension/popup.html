<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrustGuard</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div class="brand-text">
            <span class="brand-name">TrustGuard</span>
            <span class="brand-tag">Dark pattern radar</span>
          </div>
        </div>
        <button type="button" class="icon-btn" id="settingsToggle" title="Settings" aria-label="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
        </button>
      </header>

      <section class="settings-panel" id="settingsPanel" hidden>
        <label class="field-label" for="apiBaseInput">API base URL</label>
        <input type="url" id="apiBaseInput" class="field-input" placeholder="http://localhost:8000" autocomplete="off" />
        <p class="field-hint">Must match your TrustGuard FastAPI server (no trailing slash).</p>
        <button type="button" class="btn-secondary" id="saveSettings">Save</button>
      </section>

      <main class="main">
        <button type="button" class="btn-scan" id="scanBtn">
          <span class="btn-scan-inner">
            <svg class="btn-scan-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 3v3M12 18v3M3 12h3M18 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
            </svg>
            <span>Scan This Page</span>
          </span>
        </button>

        <div class="loading" id="loadingState" hidden>
          <div class="loading-ring" aria-hidden="true"></div>
          <p class="loading-text">
            Analyzing UI patterns
            <span class="dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span>
          </p>
        </div>

        <div class="error" id="errorState" hidden>
          <p class="error-title">Something went wrong</p>
          <p class="error-msg" id="errorMsg"></p>
        </div>

        <section class="results" id="resultsSection" hidden>
          <div class="score-block">
            <div class="score-label">Manipulation score</div>
            <div class="score-row">
              <span class="score-value" id="scoreValue">0</span>
              <span class="score-max">/ 100</span>
            </div>
            <div class="score-bar"><div class="score-bar-fill" id="scoreBarFill"></div></div>
          </div>

          <div class="chips" id="severityChips"></div>

          <p class="verdict" id="verdictText"></p>

          <div class="patterns-wrap">
            <div class="patterns-list" id="patternsList"></div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <a class="footer-link" id="fullReportLink" href="http://localhost:3000" target="_blank" rel="noopener noreferrer">Open full report</a>
      </footer>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
